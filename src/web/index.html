<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信聊天助手</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<div id="app">
  <header class="header">
    <div class="header-logo">微信聊天助手</div>
    <nav class="header-nav">
      <button class="nav-btn active" data-page="chat">聊天</button>
      <button class="nav-btn" data-page="contacts">通讯录</button>
      <button class="nav-btn" data-page="search">搜索</button>
      <button class="nav-btn" data-page="dashboard">统计</button>
      <button class="nav-btn" data-page="setup">设置</button>
    </nav>
    <div class="header-actions">
      <div class="status-badge" id="statusBadge">
        <span class="status-dot disconnected" id="statusDot"></span>
        <span id="statusText">加载中...</span>
      </div>
    </div>
  </header>

  <main class="main-content" id="mainContent"></main>
</div>

<script>
const API = '';
let state = {
  page: 'chat',
  sessions: [],
  currentSession: null,
  messages: [],
  contacts: [],
  searchResults: [],
  messageOffset: 0,
  contactOffset: 0,
  searchOffset: 0,
  loading: false,
};

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);
const mainContent = () => $('#mainContent');

async function api(path, opts = {}) {
  const res = await fetch(API + path, opts);
  if (!res.ok) throw new Error(`API Error ${res.status}`);
  return res.json();
}

function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const time = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  if (d.toDateString() === now.toDateString()) return time;
  return `${d.getMonth()+1}/${d.getDate()} ${time}`;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function getInitial(name) {
  if (!name) return '?';
  return name.charAt(0).toUpperCase();
}

function getTypeTag(type) {
  const map = { 3:'image', 34:'voice', 43:'video', 47:'emoji', 49:'app', 10000:'system', 10002:'revoke' };
  const labels = { image:'图片', voice:'语音', video:'视频', emoji:'表情', app:'应用', system:'系统', revoke:'撤回' };
  const t = map[type];
  if (!t) return '';
  return `<span class="message-type-tag tag-${t}">${labels[t]}</span>`;
}

function renderMessageContent(msg) {
  if (msg.type === 10000 || msg.type === 10002) {
    return `<div class="message-system"><span class="message-bubble">${escapeHtml(msg.content)}</span></div>`;
  }
  const side = msg.isSelf ? 'self' : 'other';
  const sender = (!msg.isSelf && msg.isChatRoom) ? `<div class="message-sender">${escapeHtml(msg.sender || '')}</div>` : '';

  let bubble = '';
  if (msg.type === 3) {
    if (msg.mediaPath) {
      const imgSrc = `${API}/api/image?path=${encodeURIComponent(msg.mediaPath)}&talker=${encodeURIComponent(msg.talker)}`;
      bubble = `<div class="message-bubble image-bubble"><img class="chat-image" src="${imgSrc}" alt="[图片]" loading="lazy" onclick="openLightbox(this)" onerror="this.onerror=null;this.parentElement.innerHTML='<span class=\\'media-icon\\'>&#128247;</span> [图片]'"/></div>`;
    } else {
      bubble = `<div class="message-bubble media-bubble"><span class="media-icon">&#128247;</span> ${escapeHtml(msg.content)}</div>`;
    }
  } else if (msg.type === 34) {
    bubble = `<div class="message-bubble media-bubble"><span class="media-icon">&#127908;</span> ${escapeHtml(msg.content)}</div>`;
  } else if (msg.type === 43) {
    if (msg.mediaPath) {
      const videoSrc = `${API}/api/video?path=${encodeURIComponent(msg.mediaPath)}`;
      bubble = `<div class="message-bubble image-bubble"><video class="chat-video" src="${videoSrc}" controls preload="metadata" onerror="this.onerror=null;this.outerHTML='<div class=\\'message-bubble media-bubble\\'><span class=\\'media-icon\\'>&#127909;</span> [视频]</div>'"></video></div>`;
    } else {
      bubble = `<div class="message-bubble media-bubble"><span class="media-icon">&#127909;</span> ${escapeHtml(msg.content)}</div>`;
    }
  } else if (msg.type === 47) {
    let emojiSrc = '';
    if (msg.emojiUrl) {
      if (msg.emojiUrl.startsWith('emoji://')) {
        emojiSrc = `${API}/api/emoji?md5=${encodeURIComponent(msg.emojiUrl.replace('emoji://', ''))}`;
      } else {
        emojiSrc = msg.emojiUrl;
      }
    }
    if (emojiSrc) {
      bubble = `<div class="message-bubble emoji-bubble"><img class="chat-emoji" src="${emojiSrc}" alt="[表情]" loading="lazy" onerror="this.onerror=null;this.parentElement.innerHTML='<span class=\\'media-icon\\'>&#128512;</span> [表情]'"/></div>`;
    } else {
      bubble = `<div class="message-bubble media-bubble"><span class="media-icon">&#128512;</span> ${escapeHtml(msg.content)}</div>`;
    }
  } else if (msg.type === 49) {
    const lines = msg.content.split('\n');
    const title = lines[0] || '[应用消息]';
    const desc = lines.slice(1).join('\n');
    bubble = `<div class="message-bubble app-bubble"><div class="app-title">${escapeHtml(title)}</div>${desc ? `<div class="app-desc">${escapeHtml(desc)}</div>` : ''}</div>`;
  } else {
    const tag = getTypeTag(msg.type);
    bubble = `<div class="message-bubble">${escapeHtml(msg.content)}${tag}</div>`;
  }

  return `
    <div class="message-row ${side}">
      ${sender}
      ${bubble}
      <div class="message-time">${formatTime(msg.time)}</div>
    </div>`;
}

function renderSessionItem(s) {
  const active = state.currentSession === s.username ? 'active' : '';
  const name = s.remark || s.nickname || s.alias || s.username;
  const unread = s.unreadCount > 0 ? `<span class="unread-badge">${s.unreadCount > 99 ? '99+' : s.unreadCount}</span>` : '';
  const time = formatTime(s.lastTime);
  const msg = s.lastMessage ? escapeHtml(s.lastMessage).substring(0, 40) : '';
  const avatar = s.smallHeadUrl
    ? `<img class="session-avatar-img" src="${s.smallHeadUrl}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'session-avatar\\'>${getInitial(name)}</div>'">`
    : `<div class="session-avatar">${getInitial(name)}</div>`;

  return `
    <div class="session-item ${active}" data-username="${escapeHtml(s.username)}">
      ${avatar}
      <div class="session-info">
        <div class="session-top">
          <div class="session-name">${escapeHtml(name)}</div>
          <div class="session-time">${time}</div>
        </div>
        <div class="session-bottom">
          <div class="session-msg">${msg}</div>
          ${unread}
        </div>
      </div>
    </div>`;
}

async function checkStatus() {
  try {
    const s = await api('/api/status');
    $('#statusDot').className = 'status-dot';
    const refreshInfo = await api('/api/last-refresh');
    const refreshText = refreshInfo.lastRefresh ? ` | 更新: ${new Date(refreshInfo.lastRefresh).toLocaleTimeString('zh-CN')}` : '';
    $('#statusText').textContent = `${s.dbCount} 个数据库${refreshText}`;
    if (s.hasData && s.dbCount === 0) {
      $('#statusText').textContent = '暂无数据 - 请先设置';
      $('#statusDot').className = 'status-dot disconnected';
    }
  } catch {
    $('#statusDot').className = 'status-dot disconnected';
    $('#statusText').textContent = '服务离线';
  }
}

async function loadSessions(keyword) {
  state.loading = true;
  try {
    const q = keyword ? `?keyword=${encodeURIComponent(keyword)}` : '';
    state.sessions = await api(`/api/sessions${q}`);
  } catch (e) {
    showToast('加载会话失败: ' + e.message, 'error');
    state.sessions = [];
  }
  state.loading = false;
}

async function loadMessages(talkerId, append) {
  if (!talkerId) return;
  state.loading = true;
  try {
    const offset = append ? state.messageOffset : 0;
    const msgs = await api(`/api/messages?talker_id=${encodeURIComponent(talkerId)}&limit=50&offset=${offset}&reverse=true`);
    if (append) {
      state.messages = [...msgs, ...state.messages];
    } else {
      state.messages = msgs;
    }
    state.messageOffset = append ? offset + msgs.length : msgs.length;
  } catch (e) {
    showToast('加载消息失败: ' + e.message, 'error');
  }
  state.loading = false;
}

function renderChatPage() {
  const sessionHtml = state.sessions.map(renderSessionItem).join('');
  const current = state.sessions.find(s => s.username === state.currentSession);
  const name = current ? (current.remark || current.nickname || current.alias || current.username) : '';

  let messagesHtml = '';
  if (state.messages.length === 0 && state.currentSession) {
    messagesHtml = '<div class="empty-state"><div class="loading-spinner"></div><div>加载中...</div></div>';
  } else if (state.messages.length === 0) {
    messagesHtml = '<div class="empty-state"><div class="empty-state-icon">💬</div><div class="empty-state-text">选择一个会话查看聊天记录</div></div>';
  } else {
    const loadMore = state.messageOffset >= 50 ? `<div class="load-more-bar"><button class="btn btn-secondary btn-sm" onclick="loadOlder()">加载更多历史消息</button></div>` : '';
    const parts = [loadMore];
    let lastDate = '';
    for (const msg of state.messages) {
      const msgDate = new Date(msg.time).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
      if (msgDate !== lastDate) {
        const msgTime = new Date(msg.time);
        const today = new Date();
        let label = msgDate;
        if (msgTime.toDateString() === today.toDateString()) label = '今天';
        else if (msgTime.toDateString() === new Date(today.getTime() - 86400000).toDateString()) label = '昨天';
        parts.push(`<div class="date-separator"><span>${label}</span></div>`);
        lastDate = msgDate;
      }
      parts.push(renderMessageContent(msg));
    }
    messagesHtml = parts.join('');
  }

  mainContent().innerHTML = `
    <div class="sidebar">
      <div class="sidebar-header">
        <input class="search-box" placeholder="搜索会话..." id="sessionSearch" value="${escapeHtml($('#sessionSearch')?.value || '')}">
      </div>
      <div class="session-list" id="sessionList">
        ${sessionHtml || '<div class="empty-state" style="padding:40px"><div class="empty-state-icon">📭</div><div>暂无会话</div></div>'}
      </div>
    </div>
    <div class="chat-area">
      ${state.currentSession ? `
        <div class="chat-header">
          <div class="session-avatar">${getInitial(name)}</div>
          <div>
            <div class="chat-header-title">${escapeHtml(name)}</div>
            <div class="chat-header-info">${escapeHtml(state.currentSession)}</div>
          </div>
          ${state.currentSession.endsWith('@chatroom') ? `<button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="toggleMemberPanel()">成员</button>` : ''}
          ${state.currentSession ? `<div style="margin-left:8px" class="export-dropdown">
            <button class="btn btn-secondary btn-sm" onclick="toggleExportMenu()">导出</button>
            <div class="export-menu" id="exportMenu">
              <a href="/api/export?talker=${encodeURIComponent(state.currentSession)}&format=json" download>JSON</a>
              <a href="/api/export?talker=${encodeURIComponent(state.currentSession)}&format=txt" download>TXT</a>
              <a href="/api/export?talker=${encodeURIComponent(state.currentSession)}&format=html" download>HTML</a>
            </div>
          </div>` : ''}
        </div>
        <div style="display:flex;flex:1;overflow:hidden">
          <div class="messages-container" id="messagesContainer" style="flex:1">${messagesHtml}</div>
          <div class="member-panel" id="memberPanel" style="display:none"></div>
        </div>
      ` : `
        <div class="empty-state">
          <div class="empty-state-icon">💬</div>
          <div class="empty-state-text">选择一个会话开始浏览</div>
        </div>
      `}
    </div>`;

  const mc = $('#messagesContainer');
  if (mc && !window._preservingScroll) mc.scrollTop = mc.scrollHeight;
  window._preservingScroll = false;
}

async function selectSession(username) {
  state.currentSession = username;
  state.messages = [];
  state.messageOffset = 0;
  renderChatPage();
  await loadMessages(username);
  renderChatPage();
}

window.loadOlder = async function() {
  window._preservingScroll = true;
  await loadMessages(state.currentSession, true);
  renderChatPage();
};

let memberPanelVisible = false;
window.toggleMemberPanel = async function() {
  const panel = $('#memberPanel');
  if (!panel) return;
  memberPanelVisible = !memberPanelVisible;
  if (memberPanelVisible) {
    panel.style.display = 'block';
    panel.innerHTML = '<div style="padding:16px;color:var(--text-muted)">加载中...</div>';
    try {
      const members = await api(`/api/chatroom-members?chatroom=${encodeURIComponent(state.currentSession)}`);
      state.chatRoomMembers = members;
      renderMemberPanel(panel, members);
    } catch (e) {
      panel.innerHTML = `<div style="padding:16px;color:var(--danger)">加载失败: ${e.message}</div>`;
    }
  } else {
    panel.style.display = 'none';
  }
};

function renderMemberPanel(panel, members) {
  const html = `
    <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-weight:600">群成员 (${members.length})</div>
    <div style="overflow-y:auto;flex:1;padding:8px">
      ${members.map(m => {
        const name = m.nickname || m.wxid;
        const avatar = m.smallHeadUrl
          ? `<img class="member-avatar" src="${m.smallHeadUrl}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'member-avatar-fallback\\'>${getInitial(name)}</div>'">`
          : `<div class="member-avatar-fallback">${getInitial(name)}</div>`;
        return `<div class="member-item">${avatar}<span class="member-name">${escapeHtml(name)}</span></div>`;
      }).join('')}
    </div>`;
  panel.innerHTML = html;
}

window.toggleExportMenu = function() {
  const menu = $('#exportMenu');
  if (!menu) return;
  menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
};

document.addEventListener('click', function(e) {
  const menu = $('#exportMenu');
  if (menu && !e.target.closest('.export-dropdown')) {
    menu.style.display = 'none';
  }
});

function renderContactsPage() {
  const cards = state.contacts.map(c => {
    const name = c.remark || c.nickname || c.alias || c.username;
    const avatar = c.smallHeadUrl
      ? `<img class="contact-avatar-img" src="${c.smallHeadUrl}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'contact-avatar\\'>${getInitial(name)}</div>'">`
      : `<div class="contact-avatar">${getInitial(name)}</div>`;
    return `
      <div class="contact-card" data-username="${escapeHtml(c.username)}">
        ${avatar}
        <div>
          <div class="contact-name">${escapeHtml(name)}</div>
          ${c.remark ? `<div class="contact-remark">${escapeHtml(c.remark)}</div>` : ''}
          ${c.alias ? `<div class="contact-alias">@${escapeHtml(c.alias)}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  mainContent().innerHTML = `
    <div class="page-container">
      <div class="toolbar">
        <input class="search-input" placeholder="搜索联系人..." id="contactSearch">
        <button class="btn btn-primary" onclick="searchContacts()">搜索</button>
      </div>
      <div class="grid grid-3" id="contactsGrid">${cards || '<div class="empty-state"><div>暂无联系人</div></div>'}</div>
      <div class="pagination">
        <span class="pagination-info">${state.contactOffset} - ${state.contactOffset + state.contacts.length}</span>
        <button class="btn btn-secondary btn-sm" onclick="prevContacts()">上一页</button>
        <button class="btn btn-secondary btn-sm" onclick="nextContacts()">下一页</button>
      </div>
    </div>`;

  $$('.contact-card').forEach(el => {
    el.onclick = () => {
      state.page = 'chat';
      updateNav();
      selectSession(el.dataset.username);
    };
  });
}

async function loadContacts(keyword, offset = 0) {
  try {
    const q = keyword ? `&keyword=${encodeURIComponent(keyword)}` : '';
    state.contacts = await api(`/api/contacts?limit=60&offset=${offset}${q}`);
    state.contactOffset = offset;
  } catch (e) {
    showToast('加载联系人失败: ' + e.message, 'error');
  }
  renderContactsPage();
}

window.searchContacts = () => loadContacts($('#contactSearch')?.value);
window.nextContacts = () => loadContacts($('#contactSearch')?.value, state.contactOffset + 60);
window.prevContacts = () => loadContacts($('#contactSearch')?.value, Math.max(0, state.contactOffset - 60));

function renderSearchPage() {
  const results = state.searchResults.map(r => {
    const talkerName = r.talker || '';
    const highlighted = r.content ? escapeHtml(r.content).replace(
      new RegExp(escapeRegex(escapeHtml(state.searchKeyword || '')), 'gi'),
      match => `<mark>${match}</mark>`
    ) : '';
    return `
      <div class="search-result-item" data-talker="${escapeHtml(talkerName)}">
        <div class="search-result-talk">${escapeHtml(talkerName)} ${getTypeTag(r.type)}</div>
        <div class="search-result-content">${highlighted}</div>
        <div class="search-result-time">${formatDate(r.time)}</div>
      </div>`;
  }).join('');

  mainContent().innerHTML = `
    <div class="page-container">
      <h1 class="page-title">全局搜索</h1>
      <div class="toolbar">
        <input class="search-input" placeholder="搜索所有聊天记录..." id="globalSearch" value="${escapeHtml(state.searchKeyword || '')}">
        <button class="btn btn-primary" onclick="doSearch()">搜索</button>
      </div>
      <div id="searchResults">${results || '<div class="empty-state"><div class="empty-state-icon">🔍</div><div>输入关键词搜索所有聊天记录</div></div>'}</div>
      ${state.searchResults.length > 0 ? `
        <div class="pagination">
          <span class="pagination-info">${state.searchOffset} - ${state.searchOffset + state.searchResults.length}</span>
          <button class="btn btn-secondary btn-sm" onclick="prevSearch()">上一页</button>
          <button class="btn btn-secondary btn-sm" onclick="nextSearch()">下一页</button>
        </div>` : ''}
    </div>`;

  $$('.search-result-item').forEach(el => {
    el.onclick = () => {
      state.page = 'chat';
      updateNav();
      selectSession(el.dataset.talker);
    };
  });
}

async function doSearch(keyword, offset = 0) {
  const kw = keyword || $('#globalSearch')?.value;
  if (!kw) return;
  state.searchKeyword = kw;
  try {
    state.searchResults = await api(`/api/search?keyword=${encodeURIComponent(kw)}&limit=50&offset=${offset}`);
    state.searchOffset = offset;
  } catch (e) {
    showToast('搜索失败: ' + e.message, 'error');
    state.searchResults = [];
  }
  renderSearchPage();
}

window.doSearch = doSearch;
window.nextSearch = () => doSearch(state.searchKeyword, state.searchOffset + 50);
window.prevSearch = () => doSearch(state.searchKeyword, Math.max(0, state.searchOffset - 50));

function renderDashboard() {
  mainContent().innerHTML = `
    <div class="page-container">
      <h1 class="page-title">数据统计</h1>
      <div id="statsContent" style="text-align:center;padding:60px 0;color:var(--text-muted)">加载中...</div>
    </div>`;
  loadAndRenderStats();
}

async function loadAndRenderStats() {
  let stats;
  try {
    stats = await api('/api/stats');
  } catch (e) {
    $('#statsContent').innerHTML = `<div style="color:var(--danger)">加载失败: ${e.message}</div>`;
    return;
  }

  const personal = stats.totalSessions - stats.totalChatrooms;
  const maxHour = Math.max(...stats.hourlyActivity, 1);

  const hourBars = stats.hourlyActivity.map((c, i) => {
    const pct = (c / maxHour) * 100;
    return `<div style="display:flex;align-items:flex-end;gap:4px;height:80px">
      <div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:2px">${c > 0 ? c : ''}</div>
        <div style="width:100%;background:var(--accent);border-radius:3px 3px 0 0;height:${pct}%;min-height:2px;transition:height 0.3s"></div>
      </div>
    </div>`;
  }).join('');

  const hourLabels = Array.from({length:24}, (_, i) => 
    `<div style="flex:1;text-align:center;font-size:10px;color:var(--text-muted)">${i}</div>`
  ).join('');

  const maxDaily = Math.max(...stats.dailyActivity.map(d => d.count), 1);
  const recentDays = stats.dailyActivity.slice(-30);
  const maxRecent = Math.max(...recentDays.map(d => d.count), 1);

  const dailyBars = recentDays.map(d => {
    const pct = (d.count / maxRecent) * 100;
    return `<div title="${d.date}: ${d.count}条" style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:60px">
      <div style="width:100%;background:var(--purple);border-radius:2px 2px 0 0;height:${pct}%;min-height:1px"></div>
    </div>`;
  }).join('');

  const typeColors = {'文本':'#3b82f6','图片':'#22c55e','语音':'#f97316','视频':'#a855f7','表情':'#eab308','应用':'#06b6d4','系统':'#64748b','撤回':'#ef4444'};
  const typeTotal = stats.typeDistribution.reduce((s, t) => s + t.count, 0) || 1;
  const typeBarHtml = stats.typeDistribution.map(t => {
    const pct = ((t.count / typeTotal) * 100).toFixed(1);
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="width:50px;font-size:13px;color:var(--text-secondary)">${t.label}</span>
      <div class="stat-bar" style="flex:1"><div class="stat-bar-fill" style="width:${pct}%;background:${typeColors[t.label]||'#3b82f6'}"></div></div>
      <span style="width:70px;font-size:13px;text-align:right;color:var(--text-muted)">${t.count.toLocaleString()} (${pct}%)</span>
    </div>`;
  }).join('');

  const maxTop = stats.topContacts.length > 0 ? stats.topContacts[0].count : 1;
  const topHtml = stats.topContacts.slice(0, 15).map((c, i) => {
    const pct = (c.count / maxTop) * 100;
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="width:24px;font-size:13px;color:var(--text-muted)">${i+1}</span>
      <span style="width:120px;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(c.nickname || c.username)}</span>
      <div class="stat-bar" style="flex:1"><div class="stat-bar-fill" style="width:${pct}%;background:var(--accent)"></div></div>
      <span style="width:60px;font-size:13px;text-align:right;color:var(--text-muted)">${c.count.toLocaleString()}</span>
    </div>`;
  }).join('');

  const earliest = stats.dateRange.earliest ? new Date(stats.dateRange.earliest).toLocaleDateString('zh-CN') : '-';
  const latest = stats.dateRange.latest ? new Date(stats.dateRange.latest).toLocaleDateString('zh-CN') : '-';

  $('#statsContent').innerHTML = `
    <div class="grid grid-4" style="margin-bottom:24px">
      <div class="card">
        <div class="card-title">总消息数</div>
        <div class="card-value">${stats.totalMessages.toLocaleString()}</div>
      </div>
      <div class="card">
        <div class="card-title">会话数</div>
        <div class="card-value">${stats.totalSessions}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px">私聊 ${personal} / 群聊 ${stats.totalChatrooms}</div>
      </div>
      <div class="card">
        <div class="card-title">联系人</div>
        <div class="card-value">${stats.totalContacts.toLocaleString()}</div>
      </div>
      <div class="card">
        <div class="card-title">时间跨度</div>
        <div class="card-value" style="font-size:16px">${earliest} ~ ${latest}</div>
      </div>
    </div>
    <div class="grid grid-2" style="margin-bottom:24px">
      <div class="card">
        <div class="card-title">消息类型分布</div>
        <div style="margin-top:12px">${typeBarHtml || '<div style="color:var(--text-muted)">暂无数据</div>'}</div>
      </div>
      <div class="card">
        <div class="card-title">最活跃会话 TOP 15</div>
        <div style="margin-top:12px">${topHtml || '<div style="color:var(--text-muted)">暂无数据</div>'}</div>
      </div>
    </div>
    <div class="grid grid-2">
      <div class="card">
        <div class="card-title">24小时活跃度</div>
        <div style="margin-top:12px">
          <div style="display:flex;gap:2px;align-items:flex-end;height:80px">${hourBars}</div>
          <div style="display:flex;gap:2px;margin-top:4px">${hourLabels}</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">近30天消息趋势</div>
        <div style="margin-top:12px">
          <div style="display:flex;gap:2px;align-items:flex-end;height:60px">${dailyBars}</div>
          <div style="display:flex;justify-content:space-between;margin-top:4px">
            <span style="font-size:10px;color:var(--text-muted)">${recentDays.length > 0 ? recentDays[0].date : ''}</span>
            <span style="font-size:10px;color:var(--text-muted)">${recentDays.length > 0 ? recentDays[recentDays.length-1].date : ''}</span>
          </div>
        </div>
      </div>
    </div>`;
}

function renderSetupPage() {
  mainContent().innerHTML = `
    <div class="page-container">
      <div class="setup-wizard">
        <h1 class="page-title">初始设置</h1>

        <div class="setup-step">
          <h3><span class="step-number">1</span> 提取数据库密钥</h3>
          <div class="input-group">
            <label>微信路径（留空自动检测）</label>
            <input class="input-field" id="setupWxPath" placeholder="C:\\Program Files\\Tencent\\Weixin\\Weixin.exe">
          </div>
          <button class="btn btn-primary" onclick="doExtractKey()">提取密钥</button>
          <div id="keyResult" class="log-output" style="margin-top:12px;display:none"></div>
        </div>

        <div class="setup-step">
          <h3><span class="step-number">2</span> 解密数据库</h3>
          <div class="input-group">
            <label>数据库密钥（64位十六进制字符串）</label>
            <input class="input-field" id="setupDbKey" placeholder="粘贴上一步获取的密钥">
          </div>
          <div class="input-group">
            <label>微信数据路径</label>
            <input class="input-field" id="setupSrcPath" placeholder="例如 C:\\Users\\xxx\\Documents\\WeChat Files\\wxid_xxx">
          </div>
          <button class="btn btn-primary" onclick="doDecrypt()">开始解密</button>
          <div id="decryptResult" class="log-output" style="margin-top:12px;display:none"></div>
        </div>

        <div class="setup-step">
          <h3><span class="step-number">2.5</span> 扫描图片密钥</h3>
          <p style="color:var(--text-secondary);margin-bottom:12px">如需查看图片，需先扫描微信进程内存获取图片解密密钥。请确保微信正在运行且已查看过部分图片。</p>
          <button class="btn btn-primary" onclick="doScanImageKey()">扫描图片密钥</button>
          <div id="imageKeyResult" class="log-output" style="margin-top:12px;display:none"></div>
        </div>

        <div class="setup-step">
          <h3><span class="step-number">3</span> 开始浏览</h3>
          <p style="color:var(--text-secondary);margin-bottom:12px">解密完成后，切换到聊天标签页即可浏览聊天记录。</p>
          <button class="btn btn-secondary" onclick="navigateTo('chat')">进入聊天</button>
        </div>
      </div>
    </div>`;
}

window.doExtractKey = async function() {
  const el = $('#keyResult');
  el.style.display = 'block';
  el.textContent = '正在提取密钥...（如提示请登录微信）';
  try {
    const res = await api('/api/extract-key', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        wechat_path: $('#setupWxPath')?.value || '',
      }),
    });
    el.textContent = res.result;
    const keyMatch = res.result.match(/key[=:]\s*([0-9a-fA-F]{64})/);
    if (keyMatch) {
      $('#setupDbKey').value = keyMatch[1];
      showToast('密钥提取成功！');
    }
  } catch (e) {
    el.textContent = '错误: ' + e.message;
  }
};

window.doDecrypt = async function() {
  const el = $('#decryptResult');
  el.style.display = 'block';
  el.textContent = '正在解密...';
  try {
    const res = await api('/api/decrypt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        key: $('#setupDbKey')?.value,
        src_path: $('#setupSrcPath')?.value,
      }),
    });
    el.textContent = res.result;
    showToast('解密完成！');
    await checkStatus();
  } catch (e) {
    el.textContent = '错误: ' + e.message;
  }
};

window.doScanImageKey = async function() {
  const el = $('#imageKeyResult');
  el.style.display = 'block';
  el.textContent = '正在扫描微信进程内存...';
  try {
    const res = await api('/api/scan-image-key', { method: 'POST' });
    if (res.success) {
      el.textContent = `扫描成功！密钥: ${res.key}，XOR密钥: ${res.xor_key}`;
      showToast('图片密钥扫描成功！');
    } else {
      el.textContent = `扫描失败: ${res.error}`;
    }
  } catch (e) {
    el.textContent = '错误: ' + e.message;
  }
};

function updateNav() {
  $$('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.page === state.page));
}

window.openLightbox = function(imgEl) {
  const container = $('#messagesContainer');
  const allImages = container ? Array.from(container.querySelectorAll('.chat-image')) : [];
  const currentIndex = allImages.indexOf(imgEl);
  const images = allImages.map(i => i.src);

  const overlay = document.createElement('div');
  overlay.className = 'lightbox-overlay';
  overlay.innerHTML = `
    <div class="lightbox-close">&times;</div>
    ${images.length > 1 ? '<div class="lightbox-nav lightbox-prev">&#8249;</div>' : ''}
    <img class="lightbox-img" src="${imgEl.src}" alt="">
    ${images.length > 1 ? '<div class="lightbox-nav lightbox-next">&#8250;</div>' : ''}
    <div class="lightbox-toolbar">
      <div class="lightbox-counter">${currentIndex + 1} / ${images.length}</div>
      <button class="btn btn-secondary btn-sm" id="lightboxOriginal">查看原图</button>
    </div>
  `;
  document.body.appendChild(overlay);

  let idx = currentIndex;
  const lightboxImg = overlay.querySelector('.lightbox-img');
  const counter = overlay.querySelector('.lightbox-counter');
  let scale = 1;

  function showImage(newIdx) {
    if (newIdx < 0) newIdx = images.length - 1;
    if (newIdx >= images.length) newIdx = 0;
    idx = newIdx;
    lightboxImg.src = images[idx];
    counter.textContent = `${idx + 1} / ${images.length}`;
    scale = 1;
    lightboxImg.style.transform = '';
    originalBtn.textContent = '查看原图';
  }

  overlay.querySelector('.lightbox-close').onclick = () => overlay.remove();
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  const originalBtn = overlay.querySelector('#lightboxOriginal');
  let viewingOriginal = false;
  originalBtn.onclick = (e) => {
    e.stopPropagation();
    const src = images[idx];
    if (!viewingOriginal && src.includes('/api/image')) {
      const sep = src.includes('?') ? '&' : '?';
      lightboxImg.src = src + sep + 'original=true';
      originalBtn.textContent = '查看缩略图';
      viewingOriginal = true;
    } else if (viewingOriginal && src.includes('/api/image')) {
      lightboxImg.src = src.replace(/[?&]original=true/, '');
      originalBtn.textContent = '查看原图';
      viewingOriginal = false;
    }
  };
  const prev = overlay.querySelector('.lightbox-prev');
  const next = overlay.querySelector('.lightbox-next');
  if (prev) prev.onclick = (e) => { e.stopPropagation(); showImage(idx - 1); };
  if (next) next.onclick = (e) => { e.stopPropagation(); showImage(idx + 1); };

  overlay.onwheel = (e) => {
    e.preventDefault();
    scale += e.deltaY < 0 ? 0.2 : -0.2;
    scale = Math.max(0.2, Math.min(5, scale));
    lightboxImg.style.transform = `scale(${scale})`;
  };

  const onKey = (e) => {
    if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', onKey); }
    else if (e.key === 'ArrowLeft') showImage(idx - 1);
    else if (e.key === 'ArrowRight') showImage(idx + 1);
  };
  document.addEventListener('keydown', onKey);
};

function navigateTo(page) {
  state.page = page;
  updateNav();
  renderPage();
}
window.navigateTo = navigateTo;

function renderPage() {
  switch (state.page) {
    case 'chat':
      renderChatPage();
      break;
    case 'contacts':
      if (state.contacts.length === 0) loadContacts();
      else renderContactsPage();
      break;
    case 'search':
      renderSearchPage();
      break;
    case 'dashboard':
      renderDashboard();
      break;
    case 'setup':
      renderSetupPage();
      break;
  }
}

async function init() {
  await checkStatus();

  $$('.nav-btn').forEach(btn => {
    btn.onclick = () => navigateTo(btn.dataset.page);
  });

  try {
    await loadSessions();
  } catch {}

  renderPage();

  setInterval(async () => {
    await loadSessions($('#sessionSearch')?.value);
    await checkStatus();
    if (state.page === 'chat' && state.currentSession && !state.loading) {
      const msgs = await api(`/api/messages?talker_id=${encodeURIComponent(state.currentSession)}&limit=50&offset=0&reverse=true`);
      state.messages = msgs;
      state.messageOffset = msgs.length;
      renderChatPage();
    } else {
      renderPage();
    }
  }, 30000);

  document.addEventListener('click', (e) => {
    const si = e.target.closest('.session-item');
    if (si) selectSession(si.dataset.username);
  });

  document.addEventListener('input', (e) => {
    if (e.target.id === 'sessionSearch') {
      clearTimeout(window._searchTimeout);
      window._searchTimeout = setTimeout(() => {
        loadSessions(e.target.value).then(() => renderChatPage());
      }, 300);
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.target.id === 'globalSearch' && e.key === 'Enter') doSearch();
    if (e.target.id === 'contactSearch' && e.key === 'Enter') searchContacts();
  });
}

init();
</script>
