<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信聊天助手</title>
  <link rel="stylesheet" href="/assets/style.css">
  <style>.file-link{color:var(--accent,#60a5fa);text-decoration:underline;cursor:pointer}</style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="header-logo">微信聊天助手</div>
    <nav class="header-nav">
      <button class="nav-btn active" data-page="chat">聊天</button>
      <button class="nav-btn" data-page="contacts">通讯录</button>
      <button class="nav-btn" data-page="search">搜索</button>
      <button class="nav-btn" data-page="dashboard">统计</button>
      <button class="nav-btn" data-page="report">年度报告</button>
      <button class="nav-btn" data-page="bookmarks">收藏</button>
      <button class="nav-btn" data-page="emojis">表情</button>
      <button class="nav-btn" data-page="files">文件</button>
      <button class="nav-btn" data-page="timeline">时间线</button>
      <button class="nav-btn" data-page="setup">设置</button>
    </nav>
    <div class="header-actions">
      <button class="icon-btn" onclick="manualRefresh()" title="刷新数据" id="refreshBtn">&#8635;</button>
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" id="themeBtn">&#9790;</button>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot disconnected" id="statusDot"></span>
        <span id="statusText">加载中...</span>
      </div>
    </div>
  </header>

  <main class="main-content" id="mainContent"></main>
</div>

<script>
const API = '';
let state = {
  page: 'chat',
  sessions: [],
  currentSession: null,
  messages: [],
  contacts: [],
  searchResults: [],
  messageOffset: 0,
  allLoaded: false,
  contactOffset: 0,
  searchOffset: 0,
  searchGrouped: false,
  loading: false,
  selfWxid: '',
  aiEnabled: false,
};

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);
const mainContent = () => $('#mainContent');

async function api(path, opts = {}) {
  const res = await fetch(API + path, opts);
  if (!res.ok) throw new Error(`API Error ${res.status}`);
  return res.json();
}

function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

window.aiSummarize = async function(btn) {
  if (!state.messages.length) { showToast('没有消息可摘要', 'error'); return; }
  const origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '生成中...';
  try {
    const recent = state.messages.slice(-50);
    const lines = recent.map(m => {
      const t = new Date(m.time).toLocaleString('zh-CN');
      const s = m.isSelf ? '我' : (m.sender || '对方');
      const c = m.content.substring(0, 100);
      return `[${t}] ${s}: ${c}`;
    });
    const res = await api('/api/ai/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [
          { role: 'system', content: '你是一个聊天记录分析助手。请用简洁的中文总结以下聊天记录的要点，包括主要话题、关键决定和待办事项（如有）。控制在200字以内。' },
          { role: 'user', content: lines.join('\n') },
        ],
      }),
    });
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center';
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    overlay.innerHTML = `<div class="stats-card" style="width:480px;max-height:80vh;overflow-y:auto;padding:24px">
      <div class="stats-section-title" style="margin-bottom:12px">AI 对话摘要</div>
      <div style="font-size:14px;line-height:1.8;color:var(--text-primary);white-space:pre-wrap">${escapeHtml(res.content)}</div>
      <button class="btn btn-secondary" style="width:100%;margin-top:16px" onclick="this.closest('div[style]').remove()">关闭</button>
    </div>`;
    document.body.appendChild(overlay);
  } catch (e) {
    showToast('摘要失败: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = origText;
  }
};

window.toggleMerged = function(btn) {
  const container = btn.closest('.merged-msgs');
  if (!container) return;
  const collapsed = container.classList.contains('collapsed');
  container.classList.toggle('collapsed');
  const itemCount = container.querySelectorAll('.merged-item').length;
  btn.textContent = collapsed ? '收起' : (itemCount > 10 ? '展开全部 ' + itemCount + ' 条' : '展开');
};

window.showMergedPopup = function(btn) {
  const container = btn.closest('.merged-msgs');
  if (!container) return;
  const items = [...container.querySelectorAll('.merged-item')].map(el => el.textContent);
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `<div class="stats-card" style="width:560px;max-height:80vh;overflow-y:auto;padding:24px">
    <div class="stats-section-title" style="margin-bottom:12px">合并转发消息 (${items.length} 条)</div>
    <div style="font-size:14px;line-height:1.8">${items.map((t, i) => `<div style="padding:8px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text-secondary);font-size:12px;margin-right:8px">${i + 1}</span>${escapeHtml(t)}</div>`).join('')}</div>
    <button class="btn btn-secondary" style="width:100%;margin-top:16px" onclick="this.closest('div[style]').remove()">关闭</button>
  </div>`;
  document.body.appendChild(overlay);
};

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const time = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  if (d.toDateString() === now.toDateString()) return time;
  return `${d.getMonth()+1}/${d.getDate()} ${time}`;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function getInitial(name) {
  if (!name) return '?';
  return name.charAt(0).toUpperCase();
}

function getTypeTag(type) {
  const map = {
    3:'image', 34:'voice', 43:'video', 47:'emoji', 48:'location', 49:'app',
    10000:'system', 10002:'revoke',
    50:'voip', 51:'videovoip', 10001:'pat'
  };
  const labels = {
    image:'图片', voice:'语音', video:'视频', emoji:'表情', location:'位置',
    app:'应用', system:'系统', revoke:'撤回', voip:'通话', videovoip:'视频通话', pat:'拍一拍'
  };
  const t = map[type];
  if (!t) return '';
  return `<span class="message-type-tag tag-${t}">${labels[t]}</span>`;
}

function renderMessageContent(msg) {
  if (msg.type === 10000) {
    return `<div class="message-system"><span class="message-bubble">${escapeHtml(msg.content)}</span></div>`;
  }
  if (msg.type === 10002) {
    let recallText = msg.content;
    const cdataMatch = msg.content.match(/<replacemsg><!\[CDATA\[(.*?)\]\]><\/replacemsg>/);
    if (cdataMatch) {
      recallText = cdataMatch[1];
    } else {
      const plainMatch = msg.content.match(/<replacemsg>(.*?)<\/replacemsg>/);
      if (plainMatch) recallText = plainMatch[1];
    }
    let original = '';
    if (msg.revokedOriginal) {
      original = `<div class="revoked-original">${escapeHtml(msg.revokedOriginal)}</div>`;
    }
    return `<div class="message-system"><span class="message-bubble">${escapeHtml(recallText)}${original}</span></div>`;
  }
  const side = msg.isSelf ? 'self' : 'other';
  const senderName = (!msg.isSelf && msg.isChatRoom) ? `<div class="message-sender">${escapeHtml(msg.sender || '')}</div>` : '';
  const avatarHtml = msg.senderAvatar
    ? `<img class="msg-avatar" src="${msg.senderAvatar}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'msg-avatar-fallback\\'>${msg.isSelf ? '我' : getInitial(msg.sender || '')}</div>'">`
    : `<div class="msg-avatar-fallback">${msg.isSelf ? '我' : getInitial(msg.sender || msg.talker || '')}</div>`;
  const avatar = `<div class="msg-avatar-wrap">${avatarHtml}</div>`;

  let bubble = '';
  if (msg.type === 3) {
    if (msg.mediaPath) {
      const imgSrc = `${API}/api/image?path=${encodeURIComponent(msg.mediaPath)}&talker=${encodeURIComponent(msg.talker)}`;
      bubble = `<div class="message-bubble image-bubble"><img class="chat-image" src="${imgSrc}" alt="[图片]" loading="lazy" onclick="openLightbox(this)" onerror="handleImageError(this)"/></div>`;
    } else {
      bubble = `<div class="message-bubble media-bubble"><span class="media-icon">&#128247;</span> ${escapeHtml(msg.content)}</div>`;
    }
  } else if (msg.type === 34) {
    const dur = msg.voiceDuration ? `${msg.voiceDuration}"` : '';
    const icon = '<span class="voice-icon">&#127908;</span>';
    const durTag = dur ? `<span class="voice-dur">${dur}</span>` : '';
    if (msg.voiceText) {
      bubble = `<div class="message-bubble voice-bubble">${icon}${durTag}<span class="voice-text">${escapeHtml(msg.voiceText)}</span></div>`;
    } else {
      bubble = `<div class="message-bubble voice-bubble">${icon}${durTag}<span class="voice-label">语音</span></div>`;
    }
  } else if (msg.type === 43) {
    if (msg.mediaPath) {
      const videoSrc = `${API}/api/video?path=${encodeURIComponent(msg.mediaPath)}`;
      bubble = `<div class="message-bubble image-bubble"><video class="chat-video" src="${videoSrc}" controls preload="metadata" onerror="this.onerror=null;this.outerHTML='<div class=\\'message-bubble media-bubble\\'><span class=\\'media-icon\\'>&#127909;</span> [视频]</div>'"></video></div>`;
    } else {
      bubble = `<div class="message-bubble media-bubble"><span class="media-icon">&#127909;</span> ${escapeHtml(msg.content)}</div>`;
    }
  } else if (msg.type === 47) {
    let emojiSrc = '';
    if (msg.emojiUrl) {
      if (msg.emojiUrl.startsWith('emoji://')) {
        emojiSrc = `${API}/api/emoji?md5=${encodeURIComponent(msg.emojiUrl.replace('emoji://', ''))}`;
      } else {
        emojiSrc = msg.emojiUrl;
      }
    }
    if (emojiSrc) {
      bubble = `<div class="message-bubble emoji-bubble"><img class="chat-emoji" src="${emojiSrc}" alt="[表情]" loading="lazy" onerror="this.onerror=null;this.parentElement.innerHTML='<span class=\\'media-icon\\'>&#128512;</span> [表情]'"/></div>`;
    } else {
      bubble = `<div class="message-bubble media-bubble"><span class="media-icon">&#128512;</span> ${escapeHtml(msg.content)}</div>`;
    }
  } else if (msg.type === 48) {
    bubble = `<div class="message-bubble location-bubble"><span class="media-icon">&#128205;</span> <span>${escapeHtml(msg.content)}</span></div>`;
  } else if (msg.type === 49) {
    const lines = msg.content.split('\n');
    const title = lines[0] || '[应用消息]';
    const desc = lines.slice(1).join('\n');
    const isReply = msg.appType === 57 && msg.referContent;
    const isFile = msg.appType === 6 && msg.mediaPath;
    const isMerged = msg.subMessages && msg.subMessages.length > 0;
    const fileLink = isFile ? `<a href="${API}/api/file?path=${encodeURIComponent(msg.mediaPath)}" target="_blank" class="file-link">[文件] ${escapeHtml(title)}</a>` : '';
    const link = isFile ? fileLink : (msg.appUrl && msg.appType !== 57 ? `<a class="app-link" href="${escapeHtml(msg.appUrl)}" target="_blank" rel="noopener">${escapeHtml(title)}</a>` : `<span>${escapeHtml(title)}</span>`);
    const thumb = msg.appThumbUrl ? `<img class="app-thumb" src="${msg.appThumbUrl}" loading="lazy" onerror="this.remove()">` : '';
    const refHtml = isReply ? `<div class="refer-block" onclick="scrollToRefMsg(this)" data-ref-content="${escapeHtml(msg.referContent || '')}" data-ref-time="${escapeHtml(msg.time)}">▎${escapeHtml(msg.referSender || '')}: ${escapeHtml((msg.referContent || '').substring(0, 100))}</div>` : '';
    const mergedHtml = isMerged ? `<div class="merged-msgs collapsed" data-seq="${msg.seq}">${msg.subMessages.map(s => `<div class="merged-item">${escapeHtml(s)}</div>`).join('')}<div style="display:flex;gap:4px;margin-top:4px"><button class="merged-toggle" onclick="toggleMerged(this)">${msg.subMessages.length > 10 ? '展开全部 ' + msg.subMessages.length + ' 条' : '展开'}</button><button class="merged-toggle" onclick="showMergedPopup(this)">弹窗查看</button></div></div>` : '';
    const descHtml = !isMerged && desc && !isReply && !isFile ? `<div class="app-desc">${escapeHtml(desc.substring(0, 200))}${desc.length > 200 ? '...' : ''}</div>` : '';
    bubble = `<div class="message-bubble app-bubble">${thumb}${refHtml}<div class="app-title">${link}</div>${descHtml}${mergedHtml}</div>`;
  } else {
    const tag = getTypeTag(msg.type);
    bubble = `<div class="message-bubble">${escapeHtml(msg.content)}${tag}</div>`;
  }

  return `
    <div class="message-row ${side}" id="msg-${msg.seq}" data-raw-content="${escapeHtml(msg.content)}" data-seq="${msg.seq}" data-talker="${escapeHtml(msg.talker)}" data-time="${escapeHtml(msg.time)}" data-sender="${escapeHtml(msg.sender)}" oncontextmenu="showMsgMenu(event, this)">
      ${avatar}
      <div class="msg-body">${senderName}
      ${bubble}
      <div class="message-time">${formatTime(msg.time)}</div>
      </div>
    </div>`;
}

function renderSessionItem(s) {
  const active = state.currentSession === s.username ? 'active' : '';
  const name = s.remark || s.nickname || s.alias || s.username;
  const unread = s.unreadCount > 0 ? `<span class="unread-badge">${s.unreadCount > 99 ? '99+' : s.unreadCount}</span>` : '';
  const time = formatTime(s.lastTime);
  const msg = s.lastMessage ? escapeHtml(s.lastMessage).substring(0, 40) : '';
  const avatar = s.smallHeadUrl
    ? `<img class="session-avatar-img" src="${s.smallHeadUrl}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'session-avatar\\'>${getInitial(name)}</div>'">`
    : `<div class="session-avatar">${getInitial(name)}</div>`;

  return `
    <div class="session-item ${active}" data-username="${escapeHtml(s.username)}">
      ${avatar}
      <div class="session-info">
        <div class="session-top">
          <div class="session-name">${escapeHtml(name)}</div>
          <div class="session-time">${time}</div>
        </div>
        <div class="session-bottom">
          <div class="session-msg">${msg}</div>
          ${unread}
        </div>
      </div>
    </div>`;
}

async function checkStatus() {
  try {
    const s = await api('/api/status');
    $('#statusDot').className = 'status-dot';
    const refreshInfo = await api('/api/last-refresh');
    const refreshText = refreshInfo.lastRefresh ? ` | 更新: ${new Date(refreshInfo.lastRefresh).toLocaleTimeString('zh-CN')}` : '';
    $('#statusText').textContent = `${s.dbCount} 个数据库${refreshText}`;
    if (s.selfWxid) state.selfWxid = s.selfWxid;
    state.aiEnabled = !!s.aiEnabled;
    state.setupConfig = s;
    if (s.hasData && s.dbCount === 0) {
      $('#statusText').textContent = '暂无数据 - 请先设置';
      $('#statusDot').className = 'status-dot disconnected';
    }
  } catch {
    $('#statusDot').className = 'status-dot disconnected';
    $('#statusText').textContent = '服务离线';
  }
}

window.manualRefresh = async function() {
  const btn = $('#refreshBtn');
  if (!btn || btn.disabled) return;
  btn.disabled = true;
  btn.style.opacity = '0.5';
  try {
    const r = await api('/api/refresh', { method: 'POST' });
    if (r.success) {
      showToast('数据刷新成功');
    } else {
      showToast('刷新失败: ' + (r.error || '未知错误'), 'error');
    }
    await checkStatus();
    if (state.currentPage === 'chat' && state.currentSession) {
      state.messageOffset = 0;
      state.allLoaded = false;
      await loadMessages(state.currentSession);
      renderChatPage();
    } else if (state.currentPage === 'sessions') {
      await loadSessions();
      renderSessionsPage();
    }
  } catch (e) {
    showToast('刷新失败: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.style.opacity = '1';
  }
};

async function loadSessions(keyword) {
  state.loading = true;
  try {
    const q = keyword ? `?keyword=${encodeURIComponent(keyword)}` : '';
    state.sessions = await api(`/api/sessions${q}`);
  } catch (e) {
    showToast('加载会话失败: ' + e.message, 'error');
    state.sessions = [];
  }
  state.loading = false;
}

async function loadMessages(talkerId, append) {
  if (!talkerId) return;
  state.loading = true;
  try {
    const offset = append ? state.messageOffset : 0;
    const msgs = await api(`/api/messages?talker_id=${encodeURIComponent(talkerId)}&limit=50&offset=${offset}&reverse=true`);
    if (append) {
      state.messages = [...msgs, ...state.messages];
    } else {
      state.messages = msgs;
    }
    state.messageOffset = append ? offset + msgs.length : msgs.length;
    if (msgs.length < 50) state.allLoaded = true;
  } catch (e) {
    showToast('加载消息失败: ' + e.message, 'error');
  }
  state.loading = false;
}

function renderChatPage() {
  const sessionHtml = state.sessions.map(renderSessionItem).join('');
  const current = state.sessions.find(s => s.username === state.currentSession);
  const name = current ? (current.remark || current.nickname || current.alias || current.username) : '';
  const headerAvatar = current?.smallHeadUrl
    ? `<img class="session-avatar-img" src="${current.smallHeadUrl}" alt="" style="width:36px;height:36px;border-radius:50%;object-fit:cover" onerror="this.outerHTML='<div class=\\'session-avatar\\'>${getInitial(name)}</div>'">`
    : `<div class="session-avatar">${getInitial(name)}</div>`;

  let messagesHtml = '';
  if (state.messages.length === 0 && state.currentSession) {
    messagesHtml = '<div class="empty-state"><div class="loading-spinner"></div><div>加载中...</div></div>';
  } else if (state.messages.length === 0) {
    messagesHtml = '<div class="empty-state"><div class="empty-state-icon">💬</div><div class="empty-state-text">选择一个会话查看聊天记录</div></div>';
  } else {
    const loadMore = state.messageOffset >= 50 && !state.allLoaded ? `<div class="load-more-bar"><button class="btn btn-secondary btn-sm" onclick="loadOlder()">加载更多历史消息</button></div>` : '';
    const parts = [loadMore];
    let lastDate = '';
    for (const msg of state.messages) {
      const msgDate = new Date(msg.time).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
      if (msgDate !== lastDate) {
        const msgTime = new Date(msg.time);
        const today = new Date();
        let label = msgDate;
        if (msgTime.toDateString() === today.toDateString()) label = '今天';
        else if (msgTime.toDateString() === new Date(today.getTime() - 86400000).toDateString()) label = '昨天';
        parts.push(`<div class="date-separator"><span>${label}</span></div>`);
        lastDate = msgDate;
      }
      parts.push(renderMessageContent(msg));
    }
    messagesHtml = parts.join('');
  }

  mainContent().innerHTML = `
    <div class="sidebar">
      <div class="sidebar-header">
        <input class="search-box" placeholder="搜索会话..." id="sessionSearch" value="${escapeHtml($('#sessionSearch')?.value || '')}">
      </div>
      <div class="session-list" id="sessionList">
        ${sessionHtml || '<div class="empty-state" style="padding:40px"><div class="empty-state-icon">📭</div><div>暂无会话</div></div>'}
      </div>
    </div>
    <div class="chat-area">
      ${state.currentSession ? `
        <div class="chat-header">
          <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
          ${headerAvatar}
          <div>
            <div class="chat-header-title">${escapeHtml(name)}</div>
            <div class="chat-header-info">${escapeHtml(state.currentSession)}</div>
          </div>
          ${state.currentSession ? `<button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="toggleChatStatsPanel()">📊 统计</button>` : ''}
          ${state.currentSession.endsWith('@chatroom') ? `<button class="btn btn-secondary btn-sm" style="margin-left:4px" onclick="toggleMemberPanel()">成员</button>` : ''}
          ${state.currentSession ? `<div style="margin-left:8px" class="export-dropdown">
            <button class="btn btn-secondary btn-sm" onclick="toggleExportMenu()">导出</button>
            <div class="export-menu" id="exportMenu">
              <a href="/api/export?talker=${encodeURIComponent(state.currentSession)}&format=json" download>JSON</a>
              <a href="/api/export?talker=${encodeURIComponent(state.currentSession)}&format=txt" download>TXT</a>
              <a href="/api/export?talker=${encodeURIComponent(state.currentSession)}&format=html" download>HTML</a>
            </div>
          </div>` : ''}
        </div>
        <div style="display:flex;flex:1;overflow:hidden;flex-direction:column">
          ${state.currentSession ? `<div style="display:flex;padding:8px 16px;border-bottom:1px solid var(--border);gap:8px;align-items:center;flex-wrap:wrap">
            <input class="search-box" placeholder="搜索当前会话..." id="chatSearch" style="flex:1;min-width:120px;padding:6px 10px;font-size:13px" value="${escapeHtml($('#chatSearch')?.value || '')}">
            <input type="date" id="dateFrom" style="padding:4px 6px;font-size:12px;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border);border-radius:var(--radius)" value="${$('#dateFrom')?.value || ''}" title="开始日期">
            <span style="color:var(--text-muted);font-size:12px">~</span>
            <input type="date" id="dateTo" style="padding:4px 6px;font-size:12px;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border);border-radius:var(--radius)" value="${$('#dateTo')?.value || ''}" title="结束日期">
            <button class="btn btn-secondary btn-sm" onclick="searchInChat()">搜索</button>
            <button class="btn btn-secondary btn-sm" id="chatSearchClear" style="display:none" onclick="clearChatSearch()">清除</button>
            ${state.aiEnabled ? `<button class="btn btn-primary btn-sm" onclick="aiSummarize(this)">AI 摘要</button>
            <button class="btn btn-secondary btn-sm" onclick="aiSentiment(this)">情感分析</button>` : ''}
          </div>` : ''}
          <div style="display:flex;flex:1;overflow:hidden">
            <div class="messages-container" id="messagesContainer" style="flex:1">${messagesHtml}</div>
            <div class="member-panel" id="memberPanel" style="display:none"></div>
            <div class="chat-stats-panel" id="chatStatsPanel" style="display:none"></div>
          </div>
        </div>
      ` : `
        <div class="empty-state">
          <div class="empty-state-icon">💬</div>
          <div class="empty-state-text">选择一个会话开始浏览</div>
        </div>
      `}
    </div>`;

  const mc = $('#messagesContainer');
  if (mc && !window._preservingScroll) mc.scrollTop = mc.scrollHeight;
  window._preservingScroll = false;

  if (window._sessionListScroll >= 0) {
    const sl = $('#sessionList');
    if (sl) sl.scrollTop = window._sessionListScroll;
    window._sessionListScroll = -1;
  }
}

function renderChatStatsPanel(panel, s) {
  const typeColors = {'文本':'#3b82f6','图片':'#22c55e','语音':'#f97316','视频':'#a855f7','表情':'#eab308','应用':'#06b6d4','系统':'#64748b','撤回':'#ef4444','位置':'#14b8a6'};

  const total = s.totalMessages || 1;
  const myPct = ((s.myMessages / total) * 100).toFixed(1);
  const theirPct = ((s.theirMessages / total) * 100).toFixed(1);
  const firstDate = s.firstMessage ? new Date(s.firstMessage).toLocaleDateString('zh-CN') : '-';
  const lastDate = s.lastMessage ? new Date(s.lastMessage).toLocaleDateString('zh-CN') : '-';

  const typeTotal = s.typeDistribution.reduce((a, t) => a + t.count, 0) || 1;
  const typeItems = s.typeDistribution.map(t => {
    const pct = ((t.count / typeTotal) * 100).toFixed(1);
    const color = typeColors[t.label] || '#3b82f6';
    return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
      <span style="width:6px;height:6px;border-radius:50%;background:${color};flex-shrink:0"></span>
      <span style="width:40px;font-size:11px;color:var(--text-secondary)">${t.label}</span>
      <div style="flex:1;height:6px;background:var(--bg-tertiary);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${color};border-radius:3px"></div></div>
      <span style="width:55px;font-size:11px;text-align:right;color:var(--text-muted)">${t.count} (${pct}%)</span>
    </div>`;
  }).join('');

  const maxHour = Math.max(...s.hourlyActivity, 1);
  const hourBars = s.hourlyActivity.map((c, i) => {
    const pct = (c / maxHour) * 100;
    return `<div title="${i}时: ${c}条" style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:50px">
      <div style="width:100%;background:var(--accent);border-radius:2px 2px 0 0;height:${pct}%;min-height:1px;opacity:${0.4 + 0.6 * (c / maxHour)}"></div>
    </div>`;
  }).join('');

  const recentDays = s.dailyActivity.slice(-30);
  const maxDaily = Math.max(...recentDays.map(d => d.count), 1);
  const trendBars = recentDays.map(d => {
    const pct = (d.count / maxDaily) * 100;
    return `<div title="${d.date}: ${d.count}条" style="flex:1;border-radius:2px 2px 0 0;height:${Math.max(pct, 2)}%;min-height:1px;background:${pct > 60 ? 'var(--purple)' : 'var(--accent)'}"></div>`;
  }).join('');

  const days = ['日','一','二','三','四','五','六'];
  const maxWH = Math.max(...s.weekHourHeatmap.flat(), 1);
  const heatColors = ['var(--bg-tertiary)', 'rgba(59,130,246,0.2)', 'rgba(59,130,246,0.4)', 'rgba(59,130,246,0.6)', 'rgba(59,130,246,0.8)', 'rgba(59,130,246,1)'];
  const weekHeatmap = days.map((day, di) => {
    const cells = Array.from({length:24}, (_, hi) => {
      const val = s.weekHourHeatmap[di][hi];
      const ratio = val / maxWH;
      let level = 0;
      if (ratio > 0 && ratio < 0.15) level = 1;
      else if (ratio < 0.35) level = 2;
      else if (ratio < 0.55) level = 3;
      else if (ratio < 0.8) level = 4;
      else if (ratio > 0) level = 5;
      return `<div style="width:10px;height:10px;border-radius:2px;background:${heatColors[level]}" title="周${day} ${hi}时: ${val}条"></div>`;
    }).join('');
    return `<div style="display:flex;align-items:center;gap:2px"><span style="width:14px;font-size:9px;color:var(--text-muted)">${day}</span>${cells}</div>`;
  }).join('');

  const maxWord = s.topWords.length > 0 ? s.topWords[0].count : 1;
  const wordCloud = s.topWords.slice(0, 40).map(w => {
    const ratio = w.count / maxWord;
    const size = Math.round(10 + ratio * 18);
    const opacity = (0.4 + ratio * 0.6).toFixed(2);
    const hue = Math.round(200 + (1 - ratio) * 80);
    return `<span style="font-size:${size}px;opacity:${opacity};color:hsl(${hue},70%,60%);cursor:default;line-height:1.6;padding:0 2px" title="${w.word}: ${w.count}次">${escapeHtml(w.word)}</span>`;
  }).join(' ');

  const peakHour = s.hourlyActivity.indexOf(Math.max(...s.hourlyActivity));

  const tags = [];
  if (s.isGroup) {
    const topSender = (s.topSenders && s.topSenders[0]) ? s.topSenders[0] : null;
    const topName = topSender ? escapeHtml(topSender.nickname || topSender.sender) : '某人';
    if (topSender) tags.push({icon:'👑',text:`最活跃的是 <strong>${topName}</strong>，发了 <strong>${topSender.count.toLocaleString()}</strong> 条`});
    tags.push({icon:'💬',text:`你发了 <strong>${s.myMessages.toLocaleString()}</strong> 条，占 <strong>${((s.myMessages/(s.totalMessages||1))*100).toFixed(1)}%</strong>`});
    const memberCount = (s.topSenders || []).length + 1;
    tags.push({icon:'👥',text:`活跃成员约 <strong>${memberCount}</strong> 人`});
  } else {

    else if (s.theirMessages > s.myMessages * 1.3) tags.push({icon:'🎤',text:`TA更爱说话，发了 <strong>${s.theirMessages.toLocaleString()}</strong> 条，你 <strong>${s.myMessages.toLocaleString()}</strong> 条`});
    else tags.push({icon:'🎤',text:`势均力敌！你 <strong>${s.myMessages.toLocaleString()}</strong> 条，TA <strong>${s.theirMessages.toLocaleString()}</strong> 条`});

    if (s.replyStats.myAvgReplyMin > 0 && s.replyStats.theirAvgReplyMin > 0) {
      if (s.replyStats.myAvgReplyMin < s.replyStats.theirAvgReplyMin) {
        tags.push({icon:'⚡',text:`你更"秒回"，平均 <strong>${s.replyStats.myAvgReplyMin}</strong> 分钟，TA <strong>${s.replyStats.theirAvgReplyMin}</strong> 分钟`});
      } else {
        tags.push({icon:'🐢',text:`TA更"秒回"，平均 <strong>${s.replyStats.theirAvgReplyMin}</strong> 分钟，你 <strong>${s.replyStats.myAvgReplyMin}</strong> 分钟`});
      }
    }
  }

  tags.push({icon:'🌙',text:`最活跃的时段是 <strong>${peakHour}:00-${(peakHour+1)%24}:00</strong>`});
  tags.push({icon:'📊',text:`日均 <strong>${s.avgDaily}</strong> 条，持续 <strong>${s.totalDays}</strong> 天`});

  const emojiCount = s.typeDistribution.find(t => t.label === '表情');
  if (emojiCount && emojiCount.count > 0) {
    tags.push({icon:'😄',text:`共发表情 <strong>${emojiCount.count.toLocaleString()}</strong> 个，${emojiCount.count > 100 ? '表情包大户' : '含蓄表达'}`});
  }

  const tagHtml = tags.map(t => `<div class="fun-fact"><div class="fun-fact-icon">${t.icon}</div><div class="fun-fact-text">${t.text}</div></div>`).join('');

  panel.innerHTML = `
    <div style="position:sticky;top:0;z-index:1;background:var(--bg-secondary);padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <span style="font-weight:600;font-size:14px">📊 会话统计</span>
      <button class="btn btn-secondary btn-sm" onclick="toggleChatStatsPanel()" style="padding:2px 8px">✕</button>
    </div>
    <div style="padding:12px 16px">

      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:28px;font-weight:800;color:var(--accent)">${s.totalMessages.toLocaleString()}</div>
        <div style="font-size:12px;color:var(--text-muted)">总消息数</div>
      </div>

      ${s.isGroup ? (() => {
        const senders = [{sender:'我', nickname:'我', count: s.myMessages}, ...(s.topSenders || [])].sort((a,b) => b.count - a.count);
        const maxS = senders[0]?.count || 1;
        const rows = senders.slice(0, 10).map((m, i) => {
          const pct = ((m.count / s.totalMessages) * 100).toFixed(1);
          const barW = ((m.count / maxS) * 100).toFixed(1);
          const medal = i === 0 ? 'background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#78350f;box-shadow:0 0 6px rgba(251,191,36,0.3)' : i === 1 ? 'background:linear-gradient(135deg,#d1d5db,#9ca3af);color:#374151' : i === 2 ? 'background:linear-gradient(135deg,#f97316,#ea580c);color:#431407' : 'background:var(--bg-tertiary);color:var(--text-muted)';
          const name = m.sender === '我' ? '我' : escapeHtml(m.nickname || m.sender);
          return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
            <span style="width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;${medal}">${i+1}</span>
            <span style="width:56px;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0">${name}</span>
            <div style="flex:1;height:6px;background:var(--bg-tertiary);border-radius:3px;overflow:hidden"><div style="height:100%;width:${barW}%;background:var(--accent);border-radius:3px"></div></div>
            <span style="font-size:10px;color:var(--text-muted);width:48px;text-align:right">${pct}%</span>
          </div>`;
        }).join('');
        return `<div style="margin-bottom:16px">
          <div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">成员发言排行</div>
          ${rows}
        </div>`;
      })() : `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
        <div style="background:var(--bg-tertiary);border-radius:var(--radius);padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:700">${s.myMessages.toLocaleString()}</div>
          <div style="font-size:11px;color:var(--text-muted)">我 (${myPct}%)</div>
        </div>
        <div style="background:var(--bg-tertiary);border-radius:var(--radius);padding:10px;text-align:center">
          <div style="font-size:18px;font-weight:700">${s.theirMessages.toLocaleString()}</div>
          <div style="font-size:11px;color:var(--text-muted)">TA (${theirPct}%)</div>
        </div>
      </div>`}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
        <div style="font-size:11px;color:var(--text-muted)">首条消息 <strong style="color:var(--text-primary)">${firstDate}</strong></div>
        <div style="font-size:11px;color:var(--text-muted);text-align:right">最近消息 <strong style="color:var(--text-primary)">${lastDate}</strong></div>
      </div>

      <div style="margin-bottom:16px">
        <div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">消息类型</div>
        ${typeItems || '<div style="font-size:11px;color:var(--text-muted)">暂无</div>'}
      </div>

      <div style="margin-bottom:16px">
        <div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">活跃时段</div>
        <div style="display:flex;gap:1px;align-items:flex-end;height:50px">${hourBars}</div>
        <div style="display:flex;justify-content:space-between;margin-top:2px">
          <span style="font-size:9px;color:var(--text-muted)">0</span>
          <span style="font-size:9px;color:var(--text-muted)">6</span>
          <span style="font-size:9px;color:var(--text-muted)">12</span>
          <span style="font-size:9px;color:var(--text-muted)">18</span>
          <span style="font-size:9px;color:var(--text-muted)">23</span>
        </div>
      </div>

      <div style="margin-bottom:16px">
        <div style="font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">周×时热力图</div>
        <div style="display:flex;gap:2px">
          <div style="display:flex;flex-direction:column;gap:2px;padding-top:0">
            <span style="height:10px;font-size:9px;color:var(--text-muted);width:14px"></span>

function buildMessageQuery(talkerId, extra = {}) {
  const params = new URLSearchParams({ talker_id: talkerId, limit: String(extra.limit || 50), offset: String(extra.offset || 0), reverse: 'true' });
  if (extra.keyword) params.set('keyword', extra.keyword);
  const dateFrom = extra.dateFrom || $('#dateFrom')?.value;
  const dateTo = extra.dateTo || $('#dateTo')?.value;
  if (dateFrom) params.set('start_time', String(Math.floor(new Date(dateFrom).getTime() / 1000)));
  if (dateTo) params.set('end_time', String(Math.floor(new Date(dateTo + 'T23:59:59').getTime() / 1000)));
  return `/api/messages?${params}`;
}

window.searchInChat = async function() {
  const keyword = $('#chatSearch')?.value?.trim();
  const dateFrom = $('#dateFrom')?.value;
  const dateTo = $('#dateTo')?.value;
  if (!keyword && !dateFrom && !dateTo) return;
  if (!state.currentSession) return;
  const clearBtn = $('#chatSearchClear');
  if (clearBtn) clearBtn.style.display = 'inline-flex';
  state.messages = [];
  state.messageOffset = 0;
  state.allLoaded = false;
  window._preservingScroll = true;
  try {
    state.messages = await api(buildMessageQuery(state.currentSession, { keyword, limit: 200 }));
  } catch { state.messages = []; }
  renderChatPage();
};

window.clearChatSearch = async function() {
  const input = $('#chatSearch');
  if (input) input.value = '';
  const df = $('#dateFrom');
  if (df) df.value = '';
  const dt = $('#dateTo');
  if (dt) dt.value = '';
  const clearBtn = $('#chatSearchClear');
  if (clearBtn) clearBtn.style.display = 'none';
  state.messages = [];
  state.messageOffset = 0;
  state.allLoaded = false;
  await loadMessages(state.currentSession);
  renderChatPage();
};

window.toggleSidebar = function() {
  const sb = document.querySelector('.sidebar');
  if (sb) sb.classList.toggle('open');
};

window.toggleTheme = function() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'light' ? '' : 'light';
  if (next) {
    document.documentElement.setAttribute('data-theme', next);
  } else {
    document.documentElement.removeAttribute('data-theme');
  }
  localStorage.setItem('theme', next || 'dark');
  updateThemeBtn();
};

window.showMsgMenu = function(e, row) {
  e.preventDefault();
  const existing = $('#msgContextMenu');
  if (existing) existing.remove();

  const raw = row.getAttribute('data-raw-content') || '';
  const img = row.querySelector('.chat-image');
  const video = row.querySelector('.chat-video');

  const menu = document.createElement('div');
  menu.id = 'msgContextMenu';
  menu.className = 'context-menu';
  menu.style.left = Math.min(e.clientX, window.innerWidth - 160) + 'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight - 100) + 'px';

  let items = '';
  items += `<div class="ctx-item" onclick="bookmarkMsg(this)">⭐ 收藏</div>`;
  if (raw) {
    items += `<div class="ctx-item" onclick="copyText(this)">复制文本</div>`;
  }
  if (img) {
    items += `<div class="ctx-item" onclick="copyImage(this)">复制图片地址</div>`;
    items += `<div class="ctx-item" onclick="saveImage(this)">保存图片</div>`;
  }
  if (video) {
    items += `<div class="ctx-item" onclick="copyVideo(this)">复制视频地址</div>`;
  }
  if (!items) return;
  menu.innerHTML = items;

  menu.querySelectorAll('.ctx-item').forEach(el => {
    el._row = row;
  });

  document.body.appendChild(menu);
  setTimeout(() => {
    document.addEventListener('click', closeMsgMenu, { once: true });
  }, 0);
};

function closeMsgMenu() {
  const m = $('#msgContextMenu');
  if (m) m.remove();
}

window.bookmarkMsg = async function(el) {
  const row = el._row;
  if (!row) return;
  try {
    await api('/api/bookmark', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        talker: row.dataset.talker,
        seq: Number(row.dataset.seq),
        time: row.dataset.time,
        sender: row.dataset.sender,
        content: row.dataset.rawContent?.substring(0, 500),
      }),
    });
    showToast('已收藏');
  } catch (e) {
    showToast('收藏失败: ' + e.message, 'error');
  }
};

window.copyText = function(el) {
  const raw = el._row.getAttribute('data-raw-content') || '';
  navigator.clipboard.writeText(raw).then(() => showToast('已复制'));
  closeMsgMenu();
};

window.copyImage = function(el) {
  const img = el._row.querySelector('.chat-image');

window.scrollToRefMsg = function(el) {
  const refContent = el.dataset.refContent || '';
  if (!refContent) { showToast('无法定位引用消息'); return; }
  const refSnippet = refContent.substring(0, 30).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const rows = document.querySelectorAll('.message-row');
  let bestMatch = null;
  let bestIdx = -1;
  const currentRow = el.closest('.message-row');
  rows.forEach((row, idx) => {
    if (row === currentRow) return;
    const raw = row.getAttribute('data-raw-content') || '';
    if (raw.includes(refContent) || raw.includes(refSnippet)) {
      if (!bestMatch || (currentRow && Math.abs(idx - [...rows].indexOf(currentRow)) < Math.abs(bestIdx - [...rows].indexOf(currentRow)))) {
        bestMatch = row;
        bestIdx = idx;
      }
    }
  });
  if (bestMatch) {
    bestMatch.scrollIntoView({ behavior: 'smooth', block: 'center' });
    bestMatch.classList.remove('highlight');
    void bestMatch.offsetWidth;
    bestMatch.classList.add('highlight');
  } else {
    showToast('被引用消息不在当前视图中');
  }
};

async function doSearch(keyword, offset = 0) {
  const kw = keyword || $('#globalSearch')?.value;
  if (!kw) return;
  state.searchKeyword = kw;
  state.searchGrouped = $('#searchGroup')?.checked || false;
  try {
    const msgType = $('#searchType')?.value || '';
    const useRegex = $('#searchRegex')?.checked || false;
    let url = `/api/search?keyword=${encodeURIComponent(kw)}&limit=50&offset=${offset}`;
    if (msgType) url += `&msgType=${msgType}`;
    if (useRegex) url += `&regex=true`;
    state.searchResults = await api(url);
    state.searchOffset = offset;
  } catch (e) {
    showToast('搜索失败: ' + e.message, 'error');
    state.searchResults = [];
  }
  renderSearchPage();
}

window.doSearch = doSearch;

window.doSmartSearch = async function() {
  const query = $('#globalSearch')?.value?.trim();
  if (!query) { showToast('请输入搜索描述', 'error'); return; }
  const el = $('#searchResults');
  if (el) el.innerHTML = '<div class="loading-spinner" style="margin:40px auto"></div>';
  try {
    const data = await api('/api/ai/smart-search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query })
    });
    if (data.keywords?.length) {
      state.searchKeyword = data.keywords.join(' ');
      const searchInput = $('#globalSearch');
      if (searchInput) searchInput.value = state.searchKeyword;
    }
    state.searchResults = data.results || [];
    state.searchOffset = 0;
    renderSearchPage();
    showToast(`AI 提取关键词: ${(data.keywords || []).join(', ')}`);
  } catch (e) {
    showToast('AI 搜索失败: ' + e.message, 'error');
  }
};

window.exportSearchResults = function() {
  if (!state.searchResults.length) return;
  const header = '时间\t发送者\t会话\t内容\n';
  const rows = state.searchResults.map(r => {
    const session = state.sessions.find(s => s.username === r.talker);
    const talkerName = session ? (session.remark || session.nickname || r.talker) : r.talker;
    const t = r.time || '';
    const s = r.sender || '';
    const content = (r.content || '').replace(/\t/g, ' ').replace(/\n/g, ' ');
    return `${t}\t${s}\t${talkerName}\t${content}`;
  }).join('\n');
  const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `搜索结果_${state.searchKeyword || 'export'}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('导出成功');
};
window.nextSearch = () => doSearch(state.searchKeyword, state.searchOffset + 50);
window.prevSearch = () => doSearch(state.searchKeyword, Math.max(0, state.searchOffset - 50));

function animateCount(el, target, duration) {
  if (!duration) duration = 1200;
  let start = 0;
  const startTime = performance.now();
  function tick(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = Math.floor(eased * target);
    el.textContent = current.toLocaleString();
    if (progress < 1) requestAnimationFrame(tick);
    else el.textContent = target.toLocaleString();
  }
  requestAnimationFrame(tick);
}

async function loadAndRenderStats() {
  let stats;
  try {
    stats = await api('/api/stats');
  } catch (e) {
    $('#statsContent').innerHTML = `<div style="color:var(--danger)">加载失败: ${e.message}</div>`;
    return;
  }

  const personal = stats.totalSessions - stats.totalChatrooms;
  const earliest = stats.dateRange.earliest ? new Date(stats.dateRange.earliest).toLocaleDateString('zh-CN') : '-';
  const latest = stats.dateRange.latest ? new Date(stats.dateRange.latest).toLocaleDateString('zh-CN') : '-';

  const typeColors = {
    '文本':'#3b82f6','图片':'#22c55e','语音':'#f97316','视频':'#a855f7',
    '表情':'#eab308','应用':'#06b6d4','系统':'#64748b','撤回':'#ef4444'
  };

  const typeTotal = stats.typeDistribution.reduce((s, t) => s + t.count, 0) || 1;

  const r = 65;
  const c = 2 * Math.PI * r;
  let cumAngle = 0;
  const donutSegments = stats.typeDistribution.map(t => {
    const pct = t.count / typeTotal;
    const dashLen = pct * c;
    const seg = { label: t.label, count: t.count, pct, color: typeColors[t.label] || '#3b82f6', offset: -cumAngle, dash: `${dashLen} ${c - dashLen}` };
    cumAngle += dashLen;
    return seg;
  });

  const donutSvg = donutSegments.map(s =>
    `<circle cx="90" cy="90" r="${r}" stroke="${s.color}" stroke-dasharray="${s.dash}" stroke-dashoffset="${s.offset}" style="transition:stroke-dasharray 1s ease,stroke-dashoffset 1s ease"/>`
  ).join('');

  const donutLegend = stats.typeDistribution.slice(0, 8).map(t => {
    const pct = ((t.count / typeTotal) * 100).toFixed(1);
    return `<div class="donut-legend-item"><span class="donut-legend-dot" style="background:${typeColors[t.label]||'#3b82f6'}"></span>${t.label} ${pct}%</div>`;
  }).join('');

  const maxHour = Math.max(...stats.hourlyActivity, 1);
  const heatColors = ['var(--bg-tertiary)', 'rgba(59,130,246,0.25)', 'rgba(59,130,246,0.45)', 'rgba(59,130,246,0.65)', 'rgba(59,130,246,0.85)', 'rgba(59,130,246,1)'];
  const hourCells = stats.hourlyActivity.map((count, i) => {
    const ratio = count / maxHour;
    let level;
    if (ratio === 0) level = 0;
    else if (ratio < 0.15) level = 1;
    else if (ratio < 0.35) level = 2;
    else if (ratio < 0.55) level = 3;
    else if (ratio < 0.8) level = 4;
    else level = 5;
    return `<div class="heatmap-cell" style="background:${heatColors[level]}" data-tip="${i}时: ${count}条"></div>`;
  }).join('');

  const peakHour = stats.hourlyActivity.indexOf(Math.max(...stats.hourlyActivity));
  const peakHourNext = (peakHour + 1) % 24;

  const recentDays = stats.dailyActivity.slice(-30);
  const maxRecent = Math.max(...recentDays.map(d => d.count), 1);
  const trendColors = recentDays.map(d => {
    const ratio = d.count / maxRecent;
    if (ratio < 0.3) return 'var(--accent)';
    if (ratio < 0.6) return 'var(--purple)';
    return 'linear-gradient(0deg, #3b82f6, #a855f7)';
  });

  const trendBars = recentDays.map((d, i) => {
    const pct = (d.count / maxRecent) * 100;
    const bg = trendColors[i].includes('gradient') ? trendColors[i] : trendColors[i];
    return `<div class="trend-bar" style="height:${Math.max(pct, 2)}%;background:${bg}" data-tip="${d.date}: ${d.count}条"></div>`;
  }).join('');

  const maxTop = stats.topContacts.length > 0 ? stats.topContacts[0].count : 1;
  const topColors = ['#3b82f6', '#6366f1', '#8b5cf6', '#a855f7', '#7c3aed', '#3b82f6', '#2563eb', '#1d4ed8', '#3b82f6', '#6366f1',
                     '#8b5cf6', '#a855f7', '#7c3aed', '#3b82f6', '#2563eb'];
  const topHtml = stats.topContacts.slice(0, 15).map((contact, i) => {
    const pct = (contact.count / maxTop) * 100;
    const badgeClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : 'normal';
    const isChatroom = contact.username.includes('@chatroom');
    const clickAttr = isChatroom ? `onclick="navigateTo('chat');selectSession('${escapeHtml(contact.username)}')" style="cursor:pointer"` : '';
    return `<div ${clickAttr} class="rank-item" style="animation-delay:${i*0.06}s">
      <div class="rank-badge ${badgeClass}">${i+1}</div>
      <span class="rank-name" title="${escapeHtml(contact.nickname || contact.username)}">${escapeHtml(contact.nickname || contact.username)}</span>
      <div class="rank-bar-wrap"><div class="rank-bar" data-w="${pct}" style="width:0%;background:linear-gradient(90deg, ${topColors[i]}, ${topColors[i]}cc)"></div></div>
      <span class="rank-count">${contact.count.toLocaleString()}</span>
    </div>`;
  }).join('');

  const topSender = stats.topContacts.length > 0 ? (stats.topContacts[0].nickname || stats.topContacts[0].username) : '???';
  const avgDaily = stats.totalMessages > 0 && stats.dailyActivity.length > 0
    ? Math.round(stats.totalMessages / stats.dailyActivity.length) : 0;

  const funFacts = [];
  funFacts.push({ icon: '🌙', text: `你最活跃的时段是 <strong>${peakHour}:00-${peakHourNext}:00</strong>，果然是个夜猫子` });
  funFacts.push({ icon: '💬', text: `你和 <strong>${escapeHtml(topSender)}</strong> 聊得最多，一共 <strong>${stats.topContacts.length > 0 ? stats.topContacts[0].count.toLocaleString() : 0}</strong> 条消息` });
  funFacts.push({ icon: '📊', text: `平均每天发送 <strong>${avgDaily.toLocaleString()}</strong> 条消息，相当于一本小册子了` });
  if (stats.totalMessages > 0) {
    const textPct = stats.typeDistribution.find(t => t.label === '文本');
    if (textPct) funFacts.push({ icon: '✍️', text: `其中 <strong>${((textPct.count / stats.totalMessages) * 100).toFixed(1)}%</strong> 是纯文字，大约 <strong>${Math.round(textPct.count * 20 / 1000)}</strong> 千字` });
  }

  const funHtml = funFacts.map(f =>
    `<div class="fun-fact"><div class="fun-fact-icon">${f.icon}</div><div class="fun-fact-text">${f.text}</div></div>`
  ).join('');

  $('#statsContent').innerHTML = `
    <div class="stats-hero stats-animate">
      <div class="stats-hero-title">聊天数据总览</div>
      <div class="stats-hero-grid">
        <div class="stats-hero-card">
          <div class="stats-hero-icon" style="background:rgba(59,130,246,0.15);color:#60a5fa">💬</div>
          <div class="stats-hero-label">总消息数</div>

  container.innerHTML = '<div class="loading-spinner" style="margin:20px auto"></div>';
  try {
    const data = await api(`/api/keyword-trend?keyword=${encodeURIComponent(kw)}`);
    if (!data.length) {
      container.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:20px">未找到相关消息</div>';

    const maxCount = Math.max(...data.map(d => d.count), 1);

  } catch (e) {
    container.innerHTML = `<div style="color:var(--text-secondary);text-align:center;padding:20px">查询失败: ${escapeHtml(e.message)}</div>`;

};

window.loadInteractionGraph = async function() {
  const chatroom = document.getElementById('graphChatroom')?.value;
  if (!chatroom || !chatroom.includes('@chatroom')) { showToast('请选择一个群聊', 'error'); return; }
  const el = document.getElementById('interactionGraph');
  el.innerHTML = '<div class="loading-spinner" style="margin:20px auto"></div>';
  try {
    const data = await api('/api/interaction-graph?chatroom=' + encodeURIComponent(chatroom));
    if (!data.nodes.length) { el.innerHTML = '<div style="color:var(--text-secondary)">该群无消息数据</div>'; return; }
    const width = Math.min(700, el.offsetWidth || 700);
    const height = 500;
    const cx = width / 2, cy = height / 2;
    const maxMsg = Math.max(...data.nodes.map(n => n.messages), 1);
    const positions = data.nodes.map((n, i) => {
      const angle = (2 * Math.PI * i) / data.nodes.length - Math.PI / 2;
      const r = Math.min(cx, cy) - 60;
      return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle), ...n };
    });
    const maxEdge = Math.max(...data.edges.map(e => e.count), 1);
    let svg = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="max-width:100%">`;
    for (const e of data.edges) {
      const s = positions.find(p => p.id === e.source);
      const t = positions.find(p => p.id === e.target);
      if (!s || !t) continue;
      const opacity = Math.min(0.8, 0.1 + (e.count / maxEdge) * 0.7);
      const sw = Math.max(0.5, (e.count / maxEdge) * 4);
      svg += `<line x1="${s.x}" y1="${s.y}" x2="${t.x}" y2="${t.y}" stroke="var(--accent)" stroke-width="${sw}" opacity="${opacity.toFixed(2)}"/>`;
    }
    for (const p of positions) {
      const r = 8 + (p.messages / maxMsg) * 16;
      svg += `<circle cx="${p.x}" cy="${p.y}" r="${r}" fill="var(--accent)" opacity="0.7"/>`;
      svg += `<text x="${p.x}" y="${p.y + r + 12}" text-anchor="middle" fill="var(--text-primary)" font-size="10">${escapeHtml(p.name.substring(0, 6))}</text>`;
    }
    svg += '</svg>';
    const topEdges = data.edges.slice(0, 10).map(e => {
      const sn = data.nodes.find(n => n.id === e.source)?.name || e.source;
      const tn = data.nodes.find(n => n.id === e.target)?.name || e.target;
      return `${sn} ↔ ${tn}: ${e.count}次${e.replies ? ` (${e.replies}次回复)` : ''}`;
    }).join('<br>');
    el.innerHTML = svg + `<div style="margin-top:12px;font-size:12px;color:var(--text-secondary);text-align:left">${topEdges ? 'TOP 互动关系：<br>' + topEdges : ''}</div>`;
  } catch (e) {
    el.innerHTML = `<div style="color:var(--danger)">加载失败: ${escapeHtml(e.message)}</div>`;
  }
};

  statsStagger();

  setTimeout(() => {
    animateCount(document.getElementById('statMsgCount'), stats.totalMessages);
    animateCount(document.getElementById('statSessionCount'), stats.totalSessions);
    animateCount(document.getElementById('statContactCount'), stats.totalContacts);
  }, 200);

  setTimeout(() => {
    document.querySelectorAll('.rank-bar[data-w]').forEach(bar => {
      bar.style.width = bar.dataset.w + '%';
    });
  }, 400);
}

let mediaTypeFilter = 'all';
let mediaViewGrid = false;

window.batchDownload = async function() {
  const result = await api('/api/media?type=' + mediaTypeFilter + '&limit=100');
  const files = result.items.filter(f => f.mediaPath);
  if (!files.length) { showToast('无可下载文件', 'error'); return; }
  showToast(`开始下载 ${files.length} 个文件...`);
  let downloaded = 0;
  for (const f of files) {
    try {
      const prefix = f.type === 'image' ? '/api/image?path=' : f.type === 'video' ? '/api/video?path=' : '/api/file?path=';
      const url = API + prefix + encodeURIComponent(f.mediaPath);
      const resp = await fetch(url);
      if (!resp.ok) continue;
      const blob = await resp.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = f.fileName || `file_${downloaded}`;
      a.click();
      URL.revokeObjectURL(a.href);
      downloaded++;
      if (downloaded % 5 === 0) await new Promise(r => setTimeout(r, 500));
    } catch { /* skip */ }
  }
  showToast(`已下载 ${downloaded}/${files.length} 个文件`);
};

async function loadTimeline() {
  const date = $('#timelineDate').value;
  if (!date) return;
  const el = $('#timelineContent');
  el.innerHTML = '<div class="loading-spinner" style="margin:40px auto"></div>';
  try {
    const result = await api('/api/timeline?date=' + date);
    if (!result.messages.length) {
      el.innerHTML = '<div class="fav-empty"><div class="fav-empty-icon">📭</div>该日无消息记录</div>';
      return;
    }
    let html = `<div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">${date} 共 ${result.count} 条消息，来自 ${new Set(result.messages.map(m=>m.talker)).size} 个会话</div>`;
    let lastTalker = '';
    for (const msg of result.messages) {
      if (msg.talker !== lastTalker) {
        if (lastTalker) html += '</div>';
        lastTalker = msg.talker;
        const name = msg.talkerName || msg.talker;
        html += `<div style="margin-bottom:16px">
          <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg-secondary);border-radius:8px;cursor:pointer;margin-bottom:8px" onclick="state.page='chat';updateNav();selectSession('${escapeHtml(msg.talker)}')">
            <img src="${API}/api/avatar?wxid=${encodeURIComponent(msg.talker)}" style="width:24px;height:24px;border-radius:50%" onerror="this.style.display='none'">
            <span style="font-weight:600;font-size:14px">${escapeHtml(name)}</span>
          </div>`;
      }
      const time = new Date(msg.time).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      const isSelf = msg.isSelf;
      html += `<div style="display:flex;gap:8px;padding:4px 12px;${isSelf ? 'flex-direction:row-reverse' : ''}">
        <span style="font-size:11px;color:var(--text-muted);white-space:nowrap;min-width:40px">${time}</span>
        <div style="max-width:70%;padding:6px 10px;border-radius:8px;background:${isSelf ? 'var(--accent-primary)' : 'var(--bg-secondary)'};color:${isSelf ? 'white' : 'var(--text-primary)'};font-size:13px;word-break:break-word">${escapeHtml(msg.content).substring(0, 200)}</div>
      </div>`;
    }
    html += '</div>';
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<div class="fav-empty">加载失败: ${escapeHtml(e.message)}</div>`;
  }
}

function resolveWxName(wxid) {
  if (!wxid) return '';
  const session = state.sessions.find(s => s.username === wxid);
  if (session) return session.remark || session.nickname || wxid;
  const contact = state.contacts.find(c => c.username === wxid);
  if (contact) return contact.remark || contact.nickname || wxid;
  return wxid;
}

function getTypeLabel(type) {
  const map = {1:'文本',2:'图片',3:'语音',4:'视频',5:'链接',6:'位置',8:'视频号',14:'图文',16:'文件',18:'小程序',19:'聊天记录',20:'音乐'};
  return map[type] || '类型' + type;
}

window.doExtractKey = async function(btn) {
  const origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = origText + '...';
  const el = $('#keyResult');
  el.style.display = 'block';
  el.textContent = '正在提取密钥...（如提示请登录微信）';
  try {
    const res = await api('/api/extract-key', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        wechat_path: $('#setupWxPath')?.value || '',
      }),
    });
    el.textContent = res.result;
    const keyMatch = res.result.match(/key[=:]\s*([0-9a-fA-F]{64})/);
    if (keyMatch) {
      $('#setupDbKey').value = keyMatch[1];
      showToast('密钥提取成功！');
    }
  } catch (e) {
    el.textContent = '错误: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = origText;
  }
};

window.doDecrypt = async function(btn) {
  const origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = origText + '...';
  const el = $('#decryptResult');
  el.style.display = 'block';
  el.textContent = '正在解密...';
  try {
    const res = await api('/api/decrypt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        key: $('#setupDbKey')?.value,
        src_path: $('#setupSrcPath')?.value,
      }),
    });
    el.textContent = res.result;
    showToast('解密完成！');
    const srcPath = $('#setupSrcPath')?.value;
    if (srcPath) {
      await api('/api/save-config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ wechatDbSrcPath: srcPath }),
      });
    }
    await checkStatus();
  } catch (e) {
    el.textContent = '错误: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = origText;
  }
};

window.openLightbox = function(imgEl) {
  const container = $('#messagesContainer');
  const allImages = container ? Array.from(container.querySelectorAll('.chat-image')) : [];
  const currentIndex = allImages.indexOf(imgEl);
  const images = allImages.map(i => i.src);

  const overlay = document.createElement('div');
  overlay.className = 'lightbox-overlay';
  overlay.innerHTML = `
    <div class="lightbox-close">&times;</div>
    ${images.length > 1 ? '<div class="lightbox-nav lightbox-prev">&#8249;</div>' : ''}
    <img class="lightbox-img" src="${imgEl.src}" alt="">
    ${images.length > 1 ? '<div class="lightbox-nav lightbox-next">&#8250;</div>' : ''}
    <div class="lightbox-toolbar">
      <div class="lightbox-counter">${currentIndex + 1} / ${images.length}</div>
      <button class="btn btn-secondary btn-sm" id="lightboxOriginal">查看原图</button>
      <a class="btn btn-secondary btn-sm" id="lightboxDownload" download>保存</a>
    </div>
  `;
  document.body.appendChild(overlay);

  let idx = currentIndex;
  const lightboxImg = overlay.querySelector('.lightbox-img');
  const counter = overlay.querySelector('.lightbox-counter');
  let scale = 1;

  function showImage(newIdx) {
    if (newIdx < 0) newIdx = images.length - 1;
    if (newIdx >= images.length) newIdx = 0;
    idx = newIdx;
    lightboxImg.src = images[idx];
    counter.textContent = `${idx + 1} / ${images.length}`;
    scale = 1;
    lightboxImg.style.transform = '';
    originalBtn.textContent = '查看原图';
    viewingOriginal = false;
    downloadBtn.href = images[idx];
    downloadBtn.download = 'image_' + (idx + 1);
  }

  overlay.querySelector('.lightbox-close').onclick = () => overlay.remove();
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  const originalBtn = overlay.querySelector('#lightboxOriginal');
  const downloadBtn = overlay.querySelector('#lightboxDownload');
  downloadBtn.href = imgEl.src;
  downloadBtn.download = 'image_' + (currentIndex + 1);
  let viewingOriginal = false;
  originalBtn.onclick = (e) => {
    e.stopPropagation();
    const src = images[idx];
    if (!viewingOriginal && src.includes('/api/image')) {
      const sep = src.includes('?') ? '&' : '?';
      lightboxImg.src = src + sep + 'original=true';
      originalBtn.textContent = '查看缩略图';
      viewingOriginal = true;
    } else if (viewingOriginal && src.includes('/api/image')) {
      lightboxImg.src = src.replace(/[?&]original=true/, '');
      originalBtn.textContent = '查看原图';
      viewingOriginal = false;
    }
  };
  const prev = overlay.querySelector('.lightbox-prev');
  const next = overlay.querySelector('.lightbox-next');
  if (prev) prev.onclick = (e) => { e.stopPropagation(); showImage(idx - 1); };
  if (next) next.onclick = (e) => { e.stopPropagation(); showImage(idx + 1); };

  overlay.onwheel = (e) => {
    e.preventDefault();
    scale += e.deltaY < 0 ? 0.2 : -0.2;
    scale = Math.max(0.2, Math.min(5, scale));
    lightboxImg.style.transform = `scale(${scale})`;
  };

  const onKey = (e) => {
    if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', onKey); }
    else if (e.key === 'ArrowLeft') showImage(idx - 1);
    else if (e.key === 'ArrowRight') showImage(idx + 1);
  };
  document.addEventListener('keydown', onKey);
};

function navigateTo(page) {
  state.page = page;
  updateNav();
  renderPage();
}
window.navigateTo = navigateTo;

function renderPage() {
  switch (state.page) {
    case 'chat':
      renderChatPage();
      break;
    case 'contacts':
      if (state.contacts.length === 0) loadContacts();
      else renderContactsPage();
      break;
    case 'search':
      renderSearchPage();
      break;
    case 'dashboard':
      renderDashboard();
      break;
    case 'report':
      renderYearReport();
      break;
    case 'bookmarks':
      renderBookmarksPage();
      break;
    case 'emojis':
      renderEmojiPage();
      break;
    case 'files':
      renderFilesPage();
      break;
    case 'timeline':
      renderTimelinePage();
      break;
    case 'setup':
      renderSetupPage();
      break;
  }
}

async function init() {
  const saved = localStorage.getItem('theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  updateThemeBtn();

  await checkStatus();

  $$('.nav-btn').forEach(btn => {
    btn.onclick = () => navigateTo(btn.dataset.page);
  });

  try {
    await loadSessions();
  } catch {}

  renderPage();

  setInterval(async () => {
    const sl = $('#sessionList');
    window._sessionListScroll = sl ? sl.scrollTop : 0;
    await loadSessions($('#sessionSearch')?.value);
    await checkStatus();
    if (state.page === 'chat' && state.currentSession && !state.loading) {
      const mc = $('#messagesContainer');
      const wasAtBottom = mc && (mc.scrollHeight - mc.scrollTop - mc.clientHeight < 60);
      const fresh = await api(`/api/messages?talker_id=${encodeURIComponent(state.currentSession)}&limit=50&offset=0&reverse=true`);
      const existingSeqs = new Set(state.messages.map(m => m.seq));
      const newOnly = fresh.filter(m => !existingSeqs.has(m.seq));
      if (newOnly.length > 0) {
        state.messages = [...state.messages, ...newOnly];
        state.messageOffset += newOnly.length;
        renderChatPage();
      }
      if (wasAtBottom && mc) mc.scrollTop = mc.scrollHeight;
    } else {
      renderPage();
    }
    if (window._sessionListScroll >= 0) {
      const sl2 = $('#sessionList');
      if (sl2) sl2.scrollTop = window._sessionListScroll;
    }
  }, 30000);

  document.addEventListener('click', (e) => {
    const si = e.target.closest('.session-item');
    if (si) selectSession(si.dataset.username);
  });

  document.addEventListener('input', (e) => {
    if (e.target.id === 'sessionSearch') {
      clearTimeout(window._searchTimeout);
      window._searchTimeout = setTimeout(() => {
        loadSessions(e.target.value).then(() => renderChatPage());
      }, 300);
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.target.id === 'globalSearch' && e.key === 'Enter') doSearch();
    if (e.target.id === 'contactSearch' && e.key === 'Enter') searchContacts();
  });
}

init();
</script>
